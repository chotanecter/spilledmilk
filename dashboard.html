<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0a0a0a" />
  <title>Spilled Milk — Engagement Dashboard</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='%23000'/%3E%3Ctext x='50%25' y='58%25' text-anchor='middle' font-family='Arial' font-size='18' fill='%23fff' font-weight='700'%3ESM%3C/text%3E%3C/svg%3E" />
  <style>
    :root {
      --bg: #0a0a0a;
      --panel: #111;
      --panel-2: #161616;
      --line: #1f1f1f;
      --line-2: #2a2a2a;
      --text: #fafafa;
      --text-dim: #9a9a9a;
      --text-mute: #6b6b6b;
      --accent: #ffffff;
      --good: #34d399;
      --warn: #fbbf24;
      --bad: #f87171;
      --blood: #c1121f;
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Arial, sans-serif; -webkit-font-smoothing: antialiased; }
    .container { max-width: 1280px; margin: 0 auto; padding: 0 24px; }

    /* HEADER */
    .topbar { border-bottom: 1px solid var(--line); padding: 18px 0 0; background: rgba(10,10,10,0.94); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 10; }
    .topbar-inner { display: flex; align-items: center; justify-content: space-between; gap: 16px; flex-wrap: wrap; padding-bottom: 14px; }
    .brand { display: flex; align-items: center; gap: 12px; }
    .brand .logo { width: 36px; height: 36px; border-radius: 8px; background: #000; border: 1px solid var(--line-2); display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 11px; letter-spacing: 0.18em; }
    .brand .title { font-weight: 700; font-size: 15px; letter-spacing: -0.01em; }
    .brand .sub { font-size: 11px; color: var(--text-dim); letter-spacing: 0.12em; text-transform: uppercase; margin-top: 1px; }
    .status-pill { display: inline-flex; align-items: center; gap: 8px; padding: 6px 12px; border-radius: 999px; border: 1px solid var(--line-2); font-size: 12px; color: var(--text-dim); }
    .status-pill .ld { width: 6px; height: 6px; border-radius: 50%; background: var(--good); box-shadow: 0 0 10px var(--good); animation: pulse 2s infinite; }
    .status-pill.err .ld { background: var(--bad); box-shadow: 0 0 10px var(--bad); }
    .status-pill.warn .ld { background: var(--warn); box-shadow: 0 0 10px var(--warn); }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    .refresh-btn { background: transparent; border: 1px solid var(--line-2); color: var(--text-dim); padding: 6px 14px; border-radius: 999px; font-size: 12px; cursor: pointer; letter-spacing: 0.06em; }
    .refresh-btn:hover { color: var(--text); border-color: var(--text-dim); }

    /* TAB NAV */
    .nav-tabs { display: flex; }
    .nav-tab { background: transparent; border: none; padding: 14px 0; margin: 0 22px 0 0; color: var(--text-dim); font-size: 13px; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; }
    .nav-tab.active { color: var(--text); border-bottom-color: #fff; }
    .nav-tab:hover { color: var(--text); }

    .panel { display: none; }
    .panel.active { display: block; }

    /* PAGE HEAD */
    .page-head { padding: 40px 0 24px; }
    .page-head h1 { margin: 0; font-size: clamp(24px, 4vw, 32px); font-weight: 700; letter-spacing: -0.02em; }
    .page-head p { margin: 6px 0 0; color: var(--text-dim); font-size: 14px; max-width: 640px; }

    /* GLOBAL EMPTY / LOADING / ERROR */
    .state { padding: 60px 24px; text-align: center; }
    .state-glyph { width: 56px; height: 56px; border-radius: 50%; border: 1px solid var(--line-2); margin: 0 auto 18px; display: flex; align-items: center; justify-content: center; color: var(--text-dim); }
    .state-glyph svg { width: 24px; height: 24px; fill: currentColor; }
    .state h3 { margin: 0 0 8px; font-size: 18px; font-weight: 700; }
    .state p { margin: 0; color: var(--text-dim); font-size: 13px; max-width: 380px; margin: 0 auto; line-height: 1.55; }
    .state code { background: var(--panel-2); padding: 1px 6px; border-radius: 4px; font-size: 11px; color: var(--text); }

    /* KPI GRID */
    .kpi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; padding-bottom: 28px; }
    @media (max-width: 900px) { .kpi-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 480px) { .kpi-grid { grid-template-columns: 1fr; } }
    .kpi-card { background: var(--panel); border: 1px solid var(--line); border-radius: 14px; padding: 18px 18px 16px; position: relative; overflow: hidden; }
    .kpi-label { font-size: 11px; letter-spacing: 0.18em; color: var(--text-dim); text-transform: uppercase; font-weight: 600; }
    .kpi-value { font-size: 32px; font-weight: 700; letter-spacing: -0.02em; margin-top: 8px; line-height: 1.05; }
    .kpi-sub { font-size: 12px; color: var(--text-mute); margin-top: 6px; }

    /* CARD GRID */
    .grid-2 { display: grid; grid-template-columns: 2fr 1fr; gap: 16px; padding-bottom: 16px; }
    @media (max-width: 900px) { .grid-2 { grid-template-columns: 1fr; } }
    .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; padding-bottom: 16px; }
    @media (max-width: 900px) { .grid-3 { grid-template-columns: 1fr; } }
    .card { background: var(--panel); border: 1px solid var(--line); border-radius: 14px; padding: 20px; }
    .card-head { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 18px; }
    .card-title { font-size: 14px; font-weight: 700; letter-spacing: -0.01em; }
    .card-sub { font-size: 12px; color: var(--text-dim); margin-top: 4px; }
    .card-empty { padding: 28px 8px; color: var(--text-mute); font-size: 13px; text-align: center; }

    /* BARS */
    .bar-list { display: flex; flex-direction: column; gap: 14px; }
    .bar-row { display: grid; grid-template-columns: 140px 1fr 48px; align-items: center; gap: 12px; }
    .bar-row .lbl { font-size: 13px; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .bar-row .lbl small { display: block; color: var(--text-mute); font-size: 11px; margin-top: 2px; }
    .bar-track { background: var(--panel-2); height: 8px; border-radius: 4px; overflow: hidden; }
    .bar-fill { background: linear-gradient(90deg, #fff 0%, #d4d4d4 100%); height: 100%; border-radius: 4px; transition: width 0.4s ease; }
    .bar-row .val { font-size: 13px; font-weight: 600; text-align: right; color: var(--text-dim); }

    /* ACTIVITY FEED */
    .activity-feed { max-height: 480px; overflow-y: auto; }
    .activity-row { display: grid; grid-template-columns: 80px 1fr auto; gap: 12px; padding: 10px 4px; border-bottom: 1px solid var(--line); font-size: 13px; align-items: center; }
    .activity-row:last-child { border-bottom: none; }
    .activity-time { color: var(--text-mute); font-size: 11px; letter-spacing: 0.04em; }
    .activity-action { color: var(--text); }
    .activity-action .name { color: #fff; font-weight: 600; }
    .activity-action .k { font-family: ui-monospace, Menlo, monospace; font-size: 11px; background: var(--panel-2); padding: 1px 6px; border-radius: 4px; color: var(--text-dim); margin-left: 6px; }
    .activity-action .new-tag { font-size: 10px; padding: 1px 6px; border-radius: 4px; background: var(--blood); color: #fff; margin-left: 6px; letter-spacing: 0.08em; text-transform: uppercase; font-weight: 700; }
    .activity-loc { font-size: 12px; color: var(--text-dim); white-space: nowrap; }

    /* CONTROL PANEL */
    .control-grid { display: grid; grid-template-columns: 360px 1fr; gap: 16px; padding-bottom: 32px; }
    @media (max-width: 900px) { .control-grid { grid-template-columns: 1fr; } }
    .ctrl-list { background: var(--panel); border: 1px solid var(--line); border-radius: 14px; overflow: hidden; max-height: 720px; display: flex; flex-direction: column; }
    .ctrl-list-head { padding: 14px 16px; border-bottom: 1px solid var(--line); display: flex; align-items: center; justify-content: space-between; }
    .ctrl-list-head .t { font-size: 13px; font-weight: 700; }
    .ctrl-list-head .c { font-size: 11px; color: var(--text-dim); letter-spacing: 0.1em; text-transform: uppercase; }
    .ctrl-search { padding: 10px 12px; border-bottom: 1px solid var(--line); }
    .ctrl-search input { width: 100%; background: var(--panel-2); border: 1px solid var(--line-2); border-radius: 8px; color: var(--text); font-size: 13px; padding: 8px 12px; font-family: inherit; outline: none; }
    .ctrl-search input:focus { border-color: var(--text-dim); }
    .ctrl-items { overflow-y: auto; flex: 1; }
    .ctrl-item { padding: 14px 16px; border-bottom: 1px solid var(--line); cursor: pointer; display: flex; gap: 12px; align-items: center; transition: background 0.15s; }
    .ctrl-item:hover { background: var(--panel-2); }
    .ctrl-item.active { background: var(--panel-2); border-left: 3px solid var(--blood); padding-left: 13px; }
    .ctrl-avatar { width: 40px; height: 40px; border-radius: 50%; background: var(--panel-2); border: 1px solid var(--line-2); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 14px; flex-shrink: 0; }
    .ctrl-item.unclaimed .ctrl-avatar { color: var(--text-mute); font-weight: 400; }
    .ctrl-info { flex: 1; min-width: 0; }
    .ctrl-info .n { font-size: 13.5px; font-weight: 600; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .ctrl-info .k { font-family: ui-monospace, Menlo, monospace; font-size: 11px; color: var(--text-dim); margin-top: 2px; }
    .ctrl-info .last { font-size: 11px; color: var(--text-mute); margin-top: 2px; }
    .ctrl-item.unclaimed .n { color: var(--text-mute); font-style: italic; font-weight: 400; }

    .ctrl-detail { background: var(--panel); border: 1px solid var(--line); border-radius: 14px; padding: 24px; min-height: 500px; }
    .ctrl-detail-empty { color: var(--text-mute); font-size: 13px; padding: 60px 20px; text-align: center; }
    .ctrl-detail-head { display: flex; gap: 16px; align-items: center; padding-bottom: 20px; border-bottom: 1px solid var(--line); margin-bottom: 22px; }
    .ctrl-detail-avatar { width: 64px; height: 64px; border-radius: 50%; background: var(--panel-2); border: 1px solid var(--line-2); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 20px; flex-shrink: 0; }
    .ctrl-detail-head-info { flex: 1; }
    .ctrl-detail-name { font-size: 22px; font-weight: 700; letter-spacing: -0.01em; }
    .ctrl-detail-meta { font-size: 12px; color: var(--text-dim); margin-top: 4px; letter-spacing: 0.04em; }
    .ctrl-detail-k { font-family: ui-monospace, Menlo, monospace; font-size: 12px; padding: 4px 10px; background: var(--panel-2); border: 1px solid var(--line-2); border-radius: 6px; color: var(--text); }

    .ctrl-stat-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 24px; }
    .ctrl-stat { background: var(--panel-2); padding: 14px; border-radius: 10px; }
    .ctrl-stat .l { font-size: 10px; letter-spacing: 0.18em; color: var(--text-dim); text-transform: uppercase; font-weight: 600; }
    .ctrl-stat .v { font-size: 22px; font-weight: 700; margin-top: 6px; }
    .ctrl-stat .sub { font-size: 11px; color: var(--text-mute); margin-top: 3px; }

    .ctrl-section { margin-bottom: 22px; }
    .ctrl-section-title { font-size: 10px; letter-spacing: 0.2em; color: var(--text-dim); text-transform: uppercase; font-weight: 700; margin-bottom: 10px; }
    .ctrl-fact-row { display: grid; grid-template-columns: 120px 1fr; gap: 12px; padding: 8px 0; border-bottom: 1px solid var(--line); font-size: 13px; }
    .ctrl-fact-row:last-child { border-bottom: none; }
    .ctrl-fact-row .k { color: var(--text-dim); font-size: 12px; }
    .ctrl-fact-row .v { color: var(--text); word-break: break-word; }
    .ctrl-fact-row .v.dim { color: var(--text-mute); }

    .ctrl-recent { max-height: 240px; overflow-y: auto; }
    .ctrl-recent-row { display: grid; grid-template-columns: 90px 1fr auto; padding: 8px 0; border-bottom: 1px solid var(--line); font-size: 12.5px; align-items: center; }
    .ctrl-recent-row:last-child { border-bottom: none; }
    .ctrl-recent-row .t { color: var(--text-mute); font-size: 11px; }
    .ctrl-recent-row .c { color: var(--text); }
    .ctrl-recent-row .l { color: var(--text-dim); text-align: right; font-size: 11.5px; }

    .footer { color: var(--text-mute); font-size: 11px; padding: 20px 0 30px; text-align: center; letter-spacing: 0.08em; }
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--line-2); border-radius: 4px; }
  </style>
</head>
<body>

<div class="topbar">
  <div class="container topbar-inner">
    <div class="brand">
      <div class="logo">SM</div>
      <div>
        <div class="title">Spilled Milk</div>
        <div class="sub">Engagement Dashboard</div>
      </div>
    </div>
    <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">
      <span class="status-pill" id="status-pill"><span class="ld"></span><span id="status-text">Connecting…</span></span>
      <button class="refresh-btn" id="refresh-btn">Refresh</button>
    </div>
  </div>
  <div class="container">
    <div class="nav-tabs">
      <button class="nav-tab active" data-tab="overview">Overview</button>
      <button class="nav-tab" data-tab="control">Control</button>
    </div>
  </div>
</div>

<!-- ============ OVERVIEW ============ -->
<section class="panel active container" id="panel-overview">
  <div class="page-head">
    <h1>Overview</h1>
    <p id="overview-sub">Live tap data from the NFC keychain campaign.</p>
  </div>

  <div id="overview-body">
    <div class="state">
      <div class="state-glyph"><svg viewBox="0 0 24 24"><path d="M12 6v6l4 2"/><circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="2"/></svg></div>
      <h3>Loading…</h3>
      <p>Fetching tap data from the campaign.</p>
    </div>
  </div>
</section>

<!-- ============ CONTROL ============ -->
<section class="panel container" id="panel-control">
  <div class="page-head">
    <h1>Control</h1>
    <p>Each keychain becomes "claimed" by the first person to tap it. Search, inspect, and manage each holder.</p>
  </div>

  <div id="control-body">
    <div class="state">
      <div class="state-glyph"><svg viewBox="0 0 24 24"><path d="M12 6v6l4 2"/><circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="2"/></svg></div>
      <h3>Loading…</h3>
    </div>
  </div>
</section>

<div class="footer container" id="last-updated">—</div>

<script>
(function(){
  // ===================== STATE =====================
  let TAPS = [];
  let HOLDERS = [];  // [{ keychain_id, name, taps[], first_tap, last_tap, city, country, total, unique_users }]
  let SELECTED_KEYCHAIN = null;
  let SEARCH = '';
  let LAST_UPDATED = null;

  // ===================== UTIL =====================
  const $ = (id) => document.getElementById(id);
  const escHtml = (s) => String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  const initials = (name) => {
    if (!name) return '·';
    const parts = name.trim().split(/\s+/).filter(Boolean);
    if (parts.length === 1) return parts[0].charAt(0).toUpperCase();
    return (parts[0].charAt(0) + parts[parts.length-1].charAt(0)).toUpperCase();
  };
  const fmtNumber = (n) => (n == null ? '—' : n.toLocaleString('en-US'));
  const fmtPercent = (n) => (n == null ? '—' : Math.round(n) + '%');
  const fmtRelTime = (iso) => {
    if (!iso) return '—';
    const t = new Date(iso).getTime();
    const diff = Math.max(0, Date.now() - t);
    const s = Math.floor(diff / 1000);
    if (s < 60) return s + 's ago';
    const m = Math.floor(s / 60);
    if (m < 60) return m + 'm ago';
    const h = Math.floor(m / 60);
    if (h < 24) return h + 'h ago';
    const d = Math.floor(h / 24);
    if (d < 7) return d + 'd ago';
    return new Date(iso).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
  };
  const fmtCityLine = (t) => [t.city, t.region || t.country].filter(Boolean).join(', ') || '—';

  // ===================== FETCH =====================
  async function loadTaps() {
    setStatus('loading', 'Refreshing…');
    try {
      const r = await fetch('/api/taps?limit=2000', { cache: 'no-store' });
      const j = await r.json();
      if (!j.ok) {
        setStatus('err', 'Data error');
        renderConfigNeeded(j);
        return;
      }
      if (!j.configured) {
        setStatus('warn', 'Not connected');
        renderConfigNeeded(j);
        return;
      }
      TAPS = j.taps || [];
      LAST_UPDATED = j.updated_at;
      computeHolders();
      renderOverview();
      renderControl();
      setStatus('ok', 'Live · ' + TAPS.length + ' taps');
      $('last-updated').textContent = 'Last updated ' + new Date(LAST_UPDATED).toLocaleTimeString();
    } catch (err) {
      setStatus('err', 'Network error');
      renderError(err);
    }
  }

  function setStatus(kind, text) {
    const pill = $('status-pill');
    pill.className = 'status-pill' + (kind === 'err' ? ' err' : kind === 'warn' ? ' warn' : '');
    $('status-text').textContent = text;
  }

  // ===================== AGGREGATE =====================
  function computeHolders() {
    const byKey = new Map();
    for (const t of TAPS) {
      const k = t.keychain_id || '(no-id)';
      if (!byKey.has(k)) {
        byKey.set(k, {
          keychain_id: k,
          taps: [],
          users: new Set(),
          names: new Map(),
          first_tap: null,
          last_tap: null
        });
      }
      const h = byKey.get(k);
      h.taps.push(t);
      if (t.user_id) h.users.add(t.user_id);
      if (t.name) h.names.set(t.name, (h.names.get(t.name) || 0) + 1);
      const ts = t.tapped_at ? new Date(t.tapped_at).getTime() : 0;
      if (!h.first_tap || ts < h.first_tap) h.first_tap = ts;
      if (!h.last_tap  || ts > h.last_tap)  h.last_tap  = ts;
    }
    HOLDERS = Array.from(byKey.values()).map(h => {
      // primary name = highest-frequency name (first tapper "claims" it usually)
      const sorted = Array.from(h.names.entries()).sort((a,b) => b[1] - a[1]);
      const name = sorted.length ? sorted[0][0] : null;
      // last tap object for city/region
      const lastT = h.taps.reduce((acc, t) => {
        if (!acc) return t;
        return (new Date(t.tapped_at).getTime() > new Date(acc.tapped_at).getTime()) ? t : acc;
      }, null);
      return {
        keychain_id: h.keychain_id,
        name,
        all_names: sorted,
        total: h.taps.length,
        unique_users: h.users.size,
        first_tap: h.first_tap ? new Date(h.first_tap).toISOString() : null,
        last_tap: h.last_tap ? new Date(h.last_tap).toISOString() : null,
        last_city: lastT && lastT.city || null,
        last_region: lastT && (lastT.region || lastT.country) || null,
        taps: h.taps.sort((a,b) => new Date(b.tapped_at) - new Date(a.tapped_at))
      };
    }).sort((a,b) => {
      // sort by last_tap desc
      const at = a.last_tap ? new Date(a.last_tap).getTime() : 0;
      const bt = b.last_tap ? new Date(b.last_tap).getTime() : 0;
      return bt - at;
    });
  }

  // ===================== OVERVIEW RENDER =====================
  function renderOverview() {
    const body = $('overview-body');
    if (TAPS.length === 0) {
      body.innerHTML = emptyStateHtml('No taps yet', 'Hand out the first keychain — the moment someone taps and enters their name, the data lands here.');
      return;
    }

    // KPIs
    const totalTaps = TAPS.length;
    const uniqueVisitors = new Set(TAPS.map(t => t.user_id).filter(Boolean)).size;
    const uniqueKeychains = new Set(TAPS.map(t => t.keychain_id).filter(Boolean)).size;
    const returningCount = TAPS.filter(t => t.returning).length;
    const returningRate = totalTaps > 0 ? (returningCount / totalTaps) * 100 : 0;

    // City counts
    const cityCounts = {};
    for (const t of TAPS) {
      const city = t.city || t.region || t.country || 'Unknown';
      cityCounts[city] = (cityCounts[city] || 0) + 1;
    }
    const topCities = Object.entries(cityCounts)
      .sort((a,b) => b[1] - a[1])
      .slice(0, 6);

    // Top keychains by tap count
    const topKeychains = HOLDERS.slice(0, 6);

    // Recent activity (last 20 taps)
    const recent = TAPS.slice().sort((a,b) => new Date(b.tapped_at) - new Date(a.tapped_at)).slice(0, 25);

    const maxCity = topCities.length ? topCities[0][1] : 1;
    const maxKey = topKeychains.length ? topKeychains[0].total : 1;

    body.innerHTML = `
      <div class="kpi-grid">
        <div class="kpi-card">
          <div class="kpi-label">Total Taps</div>
          <div class="kpi-value">${fmtNumber(totalTaps)}</div>
          <div class="kpi-sub">across all keychains</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-label">Unique Visitors</div>
          <div class="kpi-value">${fmtNumber(uniqueVisitors)}</div>
          <div class="kpi-sub">distinct devices</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-label">Keychains Active</div>
          <div class="kpi-value">${fmtNumber(uniqueKeychains)}</div>
          <div class="kpi-sub">of the batch tapped at least once</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-label">Returning Rate</div>
          <div class="kpi-value">${fmtPercent(returningRate)}</div>
          <div class="kpi-sub">${fmtNumber(returningCount)} of ${fmtNumber(totalTaps)} taps</div>
        </div>
      </div>

      <div class="grid-2">
        <div class="card">
          <div class="card-head">
            <div>
              <div class="card-title">Recent Activity</div>
              <div class="card-sub">Latest ${recent.length} taps, newest first</div>
            </div>
          </div>
          <div class="activity-feed">
            ${recent.map(renderActivityRow).join('')}
          </div>
        </div>
        <div class="card">
          <div class="card-head">
            <div>
              <div class="card-title">Top Cities</div>
              <div class="card-sub">By tap count</div>
            </div>
          </div>
          ${topCities.length === 0
            ? '<div class="card-empty">No location data yet.</div>'
            : `<div class="bar-list">
                ${topCities.map(([city, n]) => `
                  <div class="bar-row">
                    <div class="lbl">${escHtml(city)}</div>
                    <div class="bar-track"><div class="bar-fill" style="width:${(n/maxCity*100).toFixed(1)}%"></div></div>
                    <div class="val">${n}</div>
                  </div>
                `).join('')}
              </div>`
          }
        </div>
      </div>

      <div class="grid-2">
        <div class="card">
          <div class="card-head">
            <div>
              <div class="card-title">Top Keychains</div>
              <div class="card-sub">By total taps · click "Control" tab to inspect</div>
            </div>
          </div>
          ${topKeychains.length === 0
            ? '<div class="card-empty">No keychain data yet.</div>'
            : `<div class="bar-list">
                ${topKeychains.map(h => `
                  <div class="bar-row">
                    <div class="lbl">${escHtml(h.name || '— unclaimed —')}<small>?k=${escHtml(h.keychain_id)}</small></div>
                    <div class="bar-track"><div class="bar-fill" style="width:${(h.total/maxKey*100).toFixed(1)}%"></div></div>
                    <div class="val">${h.total}</div>
                  </div>
                `).join('')}
              </div>`
          }
        </div>
        <div class="card">
          <div class="card-head">
            <div>
              <div class="card-title">Batch Status</div>
              <div class="card-sub">Out of 60 programmed</div>
            </div>
          </div>
          <div class="bar-list">
            <div class="bar-row">
              <div class="lbl">Activated<small>at least one tap</small></div>
              <div class="bar-track"><div class="bar-fill" style="width:${(uniqueKeychains/60*100).toFixed(1)}%"></div></div>
              <div class="val">${uniqueKeychains}/60</div>
            </div>
            <div class="bar-row">
              <div class="lbl">Multi-tap<small>tapped 2+ times</small></div>
              <div class="bar-track"><div class="bar-fill" style="width:${(HOLDERS.filter(h => h.total >= 2).length/60*100).toFixed(1)}%"></div></div>
              <div class="val">${HOLDERS.filter(h => h.total >= 2).length}/60</div>
            </div>
            <div class="bar-row">
              <div class="lbl">Claimed<small>name on file</small></div>
              <div class="bar-track"><div class="bar-fill" style="width:${(HOLDERS.filter(h => h.name).length/60*100).toFixed(1)}%"></div></div>
              <div class="val">${HOLDERS.filter(h => h.name).length}/60</div>
            </div>
          </div>
        </div>
      </div>
    `;
  }

  function renderActivityRow(t) {
    const newTag = !t.returning ? '<span class="new-tag">new</span>' : '';
    return `
      <div class="activity-row">
        <span class="activity-time">${escHtml(fmtRelTime(t.tapped_at))}</span>
        <span class="activity-action">
          <span class="name">${escHtml(t.name || 'Anonymous')}</span> tapped
          ${t.keychain_id ? `<span class="k">?k=${escHtml(t.keychain_id)}</span>` : ''}
          ${newTag}
        </span>
        <span class="activity-loc">${escHtml(fmtCityLine(t))}</span>
      </div>
    `;
  }

  // ===================== CONTROL RENDER =====================
  function renderControl() {
    const body = $('control-body');
    if (TAPS.length === 0) {
      body.innerHTML = emptyStateHtml('No keychain holders yet', 'When the first person taps a programmed keychain and enters their name, they appear here as the keychain "owner". Subsequent taps of the same chain ID get logged under that owner.');
      return;
    }

    body.innerHTML = `
      <div class="control-grid">
        <div class="ctrl-list">
          <div class="ctrl-list-head">
            <div class="t">Keychain Holders</div>
            <div class="c">${HOLDERS.length} total</div>
          </div>
          <div class="ctrl-search">
            <input type="text" id="ctrl-search" placeholder="Search name or keychain ID…" value="${escHtml(SEARCH)}">
          </div>
          <div class="ctrl-items" id="ctrl-items"></div>
        </div>
        <div class="ctrl-detail" id="ctrl-detail"></div>
      </div>
    `;

    renderControlList();
    renderControlDetail();

    $('ctrl-search').addEventListener('input', (e) => {
      SEARCH = e.target.value || '';
      renderControlList();
    });
  }

  function renderControlList() {
    const items = $('ctrl-items');
    const q = SEARCH.trim().toLowerCase();
    const filtered = HOLDERS.filter(h => {
      if (!q) return true;
      return (h.name || '').toLowerCase().includes(q) || (h.keychain_id || '').toLowerCase().includes(q);
    });

    if (!SELECTED_KEYCHAIN && filtered.length > 0) {
      SELECTED_KEYCHAIN = filtered[0].keychain_id;
    }

    if (filtered.length === 0) {
      items.innerHTML = '<div class="card-empty">No matches.</div>';
      return;
    }

    items.innerHTML = filtered.map(h => `
      <div class="ctrl-item ${SELECTED_KEYCHAIN === h.keychain_id ? 'active' : ''} ${h.name ? '' : 'unclaimed'}" data-k="${escHtml(h.keychain_id)}">
        <div class="ctrl-avatar">${escHtml(initials(h.name))}</div>
        <div class="ctrl-info">
          <div class="n">${escHtml(h.name || '— unclaimed —')}</div>
          <div class="k">?k=${escHtml(h.keychain_id)}</div>
          <div class="last">${h.total} taps · ${escHtml(fmtRelTime(h.last_tap))}</div>
        </div>
      </div>
    `).join('');

    items.querySelectorAll('.ctrl-item').forEach(el => {
      el.addEventListener('click', () => {
        SELECTED_KEYCHAIN = el.getAttribute('data-k');
        items.querySelectorAll('.ctrl-item').forEach(e => e.classList.remove('active'));
        el.classList.add('active');
        renderControlDetail();
      });
    });
  }

  function renderControlDetail() {
    const box = $('ctrl-detail');
    if (!box) return;
    const h = HOLDERS.find(x => x.keychain_id === SELECTED_KEYCHAIN);
    if (!h) {
      box.innerHTML = '<div class="ctrl-detail-empty">Select a keychain from the list to inspect.</div>';
      return;
    }
    const firstTap = h.taps[h.taps.length - 1];
    const lastTap = h.taps[0];
    const aliasRows = h.all_names.length > 1
      ? h.all_names.slice(1).map(([n, c]) => `<div class="ctrl-fact-row"><div class="k">Also tapped by</div><div class="v">${escHtml(n)} · ${c} time${c>1?'s':''}</div></div>`).join('')
      : '';
    const recentList = h.taps.slice(0, 10).map(t => `
      <div class="ctrl-recent-row">
        <span class="t">${escHtml(fmtRelTime(t.tapped_at))}</span>
        <span class="c">${escHtml(t.name || 'Anonymous')}${t.returning ? '' : ' <span class="new-tag">new</span>'}</span>
        <span class="l">${escHtml(fmtCityLine(t))}</span>
      </div>
    `).join('');

    box.innerHTML = `
      <div class="ctrl-detail-head">
        <div class="ctrl-detail-avatar">${escHtml(initials(h.name))}</div>
        <div class="ctrl-detail-head-info">
          <div class="ctrl-detail-name">${escHtml(h.name || '— unclaimed —')}</div>
          <div class="ctrl-detail-meta">${escHtml(fmtCityLine(lastTap))} · last tap ${escHtml(fmtRelTime(h.last_tap))}</div>
        </div>
        <div class="ctrl-detail-k">?k=${escHtml(h.keychain_id)}</div>
      </div>

      <div class="ctrl-stat-row">
        <div class="ctrl-stat">
          <div class="l">Total Taps</div>
          <div class="v">${fmtNumber(h.total)}</div>
          <div class="sub">${h.taps.filter(t => t.returning).length} returning</div>
        </div>
        <div class="ctrl-stat">
          <div class="l">Unique Devices</div>
          <div class="v">${fmtNumber(h.unique_users)}</div>
          <div class="sub">${h.all_names.length} name${h.all_names.length===1?'':'s'} entered</div>
        </div>
        <div class="ctrl-stat">
          <div class="l">First Tap</div>
          <div class="v" style="font-size:14px;font-weight:600;margin-top:14px">${escHtml(fmtRelTime(h.first_tap))}</div>
          <div class="sub">${firstTap ? escHtml(fmtCityLine(firstTap)) : '—'}</div>
        </div>
      </div>

      <div class="ctrl-section">
        <div class="ctrl-section-title">Holder Details</div>
        <div class="ctrl-fact-row"><div class="k">Primary name</div><div class="v">${escHtml(h.name || '—')}</div></div>
        <div class="ctrl-fact-row"><div class="k">Keychain ID</div><div class="v" style="font-family:ui-monospace,Menlo,monospace">${escHtml(h.keychain_id)}</div></div>
        <div class="ctrl-fact-row"><div class="k">Last location</div><div class="v">${escHtml(fmtCityLine(lastTap))}</div></div>
        <div class="ctrl-fact-row"><div class="k">Timezone</div><div class="v">${escHtml(lastTap && lastTap.timezone || '—')}</div></div>
        ${aliasRows}
      </div>

      <div class="ctrl-section">
        <div class="ctrl-section-title">Recent Taps · Last 10</div>
        <div class="ctrl-recent">${recentList || '<div class="card-empty">No taps yet.</div>'}</div>
      </div>
    `;
  }

  // ===================== ERROR / CONFIG STATES =====================
  function emptyStateHtml(title, body) {
    return `
      <div class="state">
        <div class="state-glyph"><svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg></div>
        <h3>${escHtml(title)}</h3>
        <p>${escHtml(body)}</p>
      </div>
    `;
  }

  function renderConfigNeeded(j) {
    const msg = j.configured
      ? `Airtable returned <code>${escHtml(j.error || 'error')}</code>. Check your token and base id.`
      : 'Add <code>AIRTABLE_TOKEN</code>, <code>AIRTABLE_BASE</code>, and <code>AIRTABLE_TABLE</code> as environment variables in Vercel, then redeploy.';
    const html = `
      <div class="state">
        <div class="state-glyph"><svg viewBox="0 0 24 24"><path d="M12 5a3 3 0 100 6 3 3 0 000-6zm0 8a8 8 0 00-8 8h2a6 6 0 1112 0h2a8 8 0 00-8-8z"/></svg></div>
        <h3>${j.configured ? 'Airtable error' : 'Not connected yet'}</h3>
        <p>${msg}</p>
        <p style="margin-top:14px;font-size:11px;color:var(--text-mute);max-width:520px">Detail: ${escHtml((j.detail || j.hint || '').slice(0, 240))}</p>
      </div>
    `;
    $('overview-body').innerHTML = html;
    $('control-body').innerHTML = html;
  }

  function renderError(err) {
    const html = `
      <div class="state">
        <div class="state-glyph"><svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg></div>
        <h3>Network error</h3>
        <p>Could not reach <code>/api/taps</code>. Detail: ${escHtml(err && err.message || 'unknown')}</p>
      </div>
    `;
    $('overview-body').innerHTML = html;
    $('control-body').innerHTML = html;
  }

  // ===================== TAB NAV =====================
  document.querySelectorAll('.nav-tab').forEach(btn => {
    btn.addEventListener('click', () => {
      const tab = btn.getAttribute('data-tab');
      document.querySelectorAll('.nav-tab').forEach(b => b.classList.toggle('active', b === btn));
      document.querySelectorAll('.panel').forEach(p => p.classList.toggle('active', p.id === 'panel-' + tab));
    });
  });

  // ===================== INIT =====================
  $('refresh-btn').addEventListener('click', loadTaps);

  // tick relative timestamps every 20s
  setInterval(() => {
    if (TAPS.length === 0) return;
    document.querySelectorAll('.activity-time').forEach(() => {}); // no-op placeholder; renderOverview re-runs on refresh
  }, 20000);

  // auto-refresh every 30 seconds
  setInterval(loadTaps, 30000);

  loadTaps();
})();
</script>
</body>
</html>
